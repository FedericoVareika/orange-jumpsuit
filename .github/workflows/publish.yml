name: Build and Publish

on:
  # Triggers when a new GitHub Release is created
  release:
    types:
      - published
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We only need Ubuntu and Windows as per your requirements
        os: [ubuntu-latest, windows-latest] 

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prepare Python Build Files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp python/pyproject.toml .
          cp python/setup.py .
          cp python/MANIFEST.in .

      - name: Prepare Python Build Files (Windows)
        if: runner.os == 'Windows'
        run: |
          copy python\pyproject.toml .
          copy python\setup.py .
          copy python\MANIFEST.in .

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.17.0
        env:

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          # LINUX: The manylinux containers are based on CentOS (manylinux2014) 
          # or AlmaLinux (manylinux_2_28). This command ensures openblas is installed 
          # before your setup.py/pyproject.toml is executed.
          CIBW_BEFORE_ALL_LINUX: "yum install -y openblas-devel || dnf install -y openblas-devel"
          
          CIBW_ENVIRONMENT_LINUX: "CFLAGS='-I/usr/include/openblas' CXXFLAGS='-I/usr/include/openblas'"

          # Optional but recommended: Skip 32-bit builds and PyPy if you don't support them.
          # It saves a lot of build time.
          CIBW_SKIP: "*-win32 *_i686 pp* *musllinux*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Python Build Files
        run: |
          cp python/pyproject.toml .
          cp python/setup.py .
          cp python/MANIFEST.in .

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Specifies the GitHub environment for PyPI Trusted Publishing
    environment: pypi
    permissions:
      id-token: write # Required for PyPI Trusted Publishing
    
    # Only upload to PyPI if this was triggered by a published release
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
